<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<!DOCTYPE html>
<html>
<head>
    <title>FileDOCK</title>

    <style>
        body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    margin: 0;
    padding: 20px;
    color: #333;
}

        h2 {
    text-align: center;
    color: white;
    font-size: 34px;
    font-weight: 600;
    letter-spacing: 1px;
}

        .container {
            max-width: 950px;
            margin: auto;
        }

        .card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 20px;
            margin-top: 20px;
            border-radius: 15px;
            box-shadow: 0px 8px 25px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-4px);
        }

        .upload-box {
            text-align: center;
        }

        input[type="file"] {
            margin: 10px 0;
            padding: 6px;
        }

        button {
            padding: 10px 18px;
            border: none;
            background: linear-gradient(45deg, #ff7e5f, #feb47b);
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
        }

        .preview img {
            margin-top: 10px;
            border-radius: 10px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.2);
        }

        .file-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }

        .file-card p {
    font-weight: 500;
    font-size: 15px;
}

        .file-card:hover {
            transform: translateY(-5px);
        }

        .file-card p {
            font-weight: bold;
        }

        .file-card button {
            background: linear-gradient(45deg, #43cea2, #185a9d);
            margin-top: 8px;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            color: white;
            font-size: 14px;
        }
        .file-upload {
    display: inline-block;
    padding: 10px 18px;
    border-radius: 8px;
    background: linear-gradient(45deg, #36d1dc, #5b86e5);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
    margin-bottom: 10px;
}

.file-upload:hover {
    transform: scale(1.05);
    background: linear-gradient(45deg, #2bbac5, #4a74d1);
}

.file-upload input {
    display: none;
}
    </style>
</head>

<body>

<div class="container">

    <h2>📂 FileDOCK</h2>

    <!-- Upload -->
    <div class="card upload-box">
        <label class="file-upload">
            <input type="file" id="fileInput">
            📁 Choose File
        </label>
        <br>
        <button onclick="uploadFile()">Upload</button>
    </div>

    <!-- Preview -->
    <div class="card preview" style="text-align:center;">
        <h3>Preview</h3>
        <div id="preview"></div>
    </div>

    <!-- File List -->
    <div class="card" style="text-align:center;">
        <h3>Uploaded Files</h3>
        <div class="file-list" id="fileList"></div>
    </div>

    <div class="footer">
        © 2026 FileDOCK | Built by Kartavya Dongre(EN22CS301485) 🚀  |  <a href="https://kartavyaxdev-portfolio-black.vercel.app/">Portfolio</a>   |  Bidyut Innovation pvt ltd.
    </div>

</div>

<script>

    // Upload File
    async function uploadFile() {
        const file = document.getElementById("fileInput").files[0];

        if (!file) {
            alert("Select file first");
            return;
        }

        const formData = new FormData();
        formData.append("file", file);

        const res = await fetch("/files/upload", {
            method: "POST",
            body: formData
        });

        const text = await res.text();

        if (!res.ok) {
            alert(text);
            return;
        }

        const fileName = text.split(": ")[1];

        displayFile(fileName, file.type);
        loadFiles();
    }

    // Display Preview
    function displayFile(fileName, type) {
        const preview = document.getElementById("preview");
        const url = "/files/" + fileName;

        const displayName = fileName.split("_")[1] || fileName;

        let content = `<p><b>${displayName}</b></p>`;

        if (type.startsWith("image")) {
            content += `<img src="${url}" width="200"/>`;
        } else {
            content += `<a href="${url}" target="_blank">Open File</a>`;
        }

        preview.innerHTML = content;
    }

    // Load Files
    async function loadFiles() {
        const res = await fetch("/files/list");
        const files = await res.json();

        const fileList = document.getElementById("fileList");
        fileList.innerHTML = "";

        files.forEach(file => {

            const displayName = file.split("_")[1] || file;

            const div = document.createElement("div");
            div.className = "file-card";

            div.innerHTML = `
                <p>📄 ${displayName}</p>
                <button onclick="previewFile('${file}')">View</button>
            `;

            fileList.appendChild(div);
        });
    }

    // Preview from list
    function previewFile(fileName) {
        let type = "file";

        if (
            fileName.endsWith(".png") ||
            fileName.endsWith(".jpg") ||
            fileName.endsWith(".jpeg")
        ) {
            type = "image";
        }

        displayFile(fileName, type);
    }

    // Load on start
    window.onload = loadFiles;

</script>

</body>
</html>
